version: "3.8"

services:
  web:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mongo
    restart: always
    volumes:
      - db-data:/data/db
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network: